version: '3.9'
services:
  db:
    image: postgres:17-alpine
    container_name: todo_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: todo-api:latest
    container_name: migrate
    command: ./migrate
    restart: no
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
  
  app:
    image: todo-api:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:${SERVER_PORT}"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - backend

networks:
  backend:
    driver: bridge